name: Haberleri Guncelle

on:
  schedule:
    - cron: '0 0 * * *' # Her gün gece yarısı 1 kez çalışır
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python'u Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python Betiğini Çalıştır (Haberleri Çek ve RSS Oluştur)
        run: python scraper.py

      - name: Değişiklikleri Git'e Kaydet ve Yükle
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add haberler.json rss.xml
          git commit -m "Otomatik güncelleme: Yeni haberler ve RSS beslemesi oluşturuldu" || echo "Değişiklik yok"
          git pull --rebase origin main
          git push
