name: Haberleri Guncelle

on:
  schedule:
    - cron: '0 */6 * * *' # Her 6 saatte bir çalışır
  workflow_dispatch: # GitHub sayfasından butona basarak manuel çalıştırmana olanak tanır

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python'u Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python Betiğini Çalıştır (Haberleri Çek ve Çevir)
        run: python scraper.py

      - name: Değişiklikleri Git'e Kaydet ve Yükle
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add haberler.json
          git commit -m "Otomatik güncelleme: Yeni haberler çekildi ve çevrildi" || echo "Değişiklik yok"
          git push
