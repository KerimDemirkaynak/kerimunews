<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haber Detayı - Kerimu Animasyon Haberleri</title>
    <link rel="icon" href="https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=http://animenewsnetwork.com/&size=16">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --header-bg: #0b1120;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background-color: var(--header-bg); border-bottom: 1px solid #334155; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; padding: 1.2rem 1rem; gap: 1rem; }
        .logo-container { display: flex; align-items: center; gap: 8px; color: var(--text-main); text-decoration: none; }
        .logo-icon { display: flex; align-items: center; color: var(--accent); }
        header h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
        
        main { flex: 1; max-width: 800px; margin: 2rem auto; padding: 0 1rem; width: 100%; }
        
        .article-container { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #334155; margin-bottom: 2rem; }
        .article-image { width: 100%; max-height: 400px; object-fit: cover; display: block; }
        .article-header { padding: 2rem; border-bottom: 1px solid #334155; }
        .article-title { font-size: 2rem; color: #fff; margin-bottom: 1rem; line-height: 1.3; }
        .article-meta { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 0.9rem; }
        
        .article-body { padding: 2rem; color: #e2e8f0; font-size: 1.1rem; line-height: 1.8; }
        
        .original-link { display: inline-block; margin-top: 1rem; color: var(--accent); text-decoration: none; font-weight: bold; }
        .original-link:hover { text-decoration: underline; }

        .comments-section { background-color: var(--card-bg); border-radius: 12px; padding: 2rem; border: 1px solid #334155; }
        .comments-title { font-size: 1.5rem; margin-bottom: 1.5rem; color: #fff; border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; display: inline-block;}

        footer { background-color: var(--header-bg); border-top: 1px solid #334155; padding: 2rem 1rem; text-align: center; margin-top: auto; }
        .footer-content { max-width: 1200px; margin: 0 auto; color: var(--text-muted); font-size: 0.9rem; }
        .footer-links a { color: var(--text-muted); text-decoration: none; margin: 0 10px; }
        .footer-links a:hover { color: var(--accent); }
        
        .back-btn { display: inline-block; margin-bottom: 1rem; color: var(--accent); text-decoration: none; font-weight: bold; }
        .back-btn:hover { text-decoration: underline; }
        
        @media (max-width: 768px) {
            .article-header { padding: 1.5rem; }
            .article-body { padding: 1.2rem; font-size: 1.05rem; }
            .article-title { font-size: 1.6rem; }
            .comments-section { padding: 1.2rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="https://kerimdemirkaynak.github.io/kerimunews/" class="logo-container">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
                        <polyline points="17 2 12 7 7 2"></polyline>
                    </svg>
                </div>
                <h1>Kerimu Animasyon Haberleri</h1>
            </a>
        </div>
    </header>

    <main>
        <a href="https://kerimdemirkaynak.github.io/kerimunews/" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Ana Sayfaya Dön</a>
        
        <article class="article-container" id="news-content">
            <div style="padding: 3rem; text-align: center; color: var(--text-muted);">Haber yükleniyor...</div>
        </article>

        <section class="comments-section">
            <h3 class="comments-title"><i class="fa-solid fa-comments"></i> Yorumlar</h3>
            <div id="giscus-container"></div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; <span id="current-year"></span> Kerim Demirkaynak - Tüm Hakları Saklıdır.</p>
            <div class="footer-links" style="margin-top: 10px;">
                <a href="hakkimizda.html">Hakkımızda & Kaynaklar</a> | 
                <a href="https://kerimdemirkaynak.github.io/iletisim" target="_blank">İletişim</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        const loadGiscus = () => {
            const container = document.getElementById('giscus-container');
            if (!container) return;
            
            const giscusScript = document.createElement('script');
            giscusScript.src = "https://giscus.app/client.js";
            giscusScript.setAttribute('data-repo', "KerimDemirkaynak/Yorumlar");
            giscusScript.setAttribute('data-repo-id', "R_kgDOPPm0QA");
            giscusScript.setAttribute('data-category', "Yorumlar");
            giscusScript.setAttribute('data-category-id', "DIC_kwDOPPm0QM4CtM73");
            giscusScript.setAttribute('data-mapping', "url");
            giscusScript.setAttribute('data-strict', "0");
            giscusScript.setAttribute('data-reactions-enabled', "1");
            giscusScript.setAttribute('data-emit-metadata', "0");
            giscusScript.setAttribute('data-input-position', "top");
            giscusScript.setAttribute('data-theme', "dark_dimmed"); 
            giscusScript.setAttribute('data-lang', "tr");
            giscusScript.setAttribute('crossorigin', "anonymous");
            giscusScript.async = true;

            container.appendChild(giscusScript);
        };

        async function haberiGetir() {
            const urlParams = new URLSearchParams(window.location.search);
            const haberId = urlParams.get('id'); // parseInt KALDIRILDI! Artık ID'ler harf/sayı karışık.

            if (!haberId) {
                document.getElementById('news-content').innerHTML = '<div style="padding: 2rem; text-align: center;">Haber bulunamadı.</div>';
                return;
            }

            try {
                // Sadece o habere özel JSON dosyasını çekiyoruz
                const response = await fetch(`haberler/${haberId}.json`);
                if (!response.ok) throw new Error('Haber dosyası bulunamadı.');
                
                const haber = await response.json();

                document.title = `${haber.baslik} - Kerimu Animasyon`;
                
                let resimHTML = haber.resim ? `<img src="${haber.resim}" alt="${haber.baslik}" class="article-image">` : '';
                
                let formatlanmisMetin = haber.tamMetin
                    .split('\n')
                    .filter(p => p.trim().length > 0)
                    .map(p => `<p style="margin-bottom: 1.5rem; text-align: left;">${p.trim()}</p>`)
                    .join('');
                
                document.getElementById('news-content').innerHTML = `
                    ${resimHTML}
                    <div class="article-header">
                        <h1 class="article-title">${haber.baslik}</h1>
                        <div class="article-meta">
                            <span>Kaynak: <strong>${haber.kaynak}</strong></span>
                            <span>${haber.tarih}</span>
                        </div>
                    </div>
                    <div class="article-body">
                        ${formatlanmisMetin}
                        <a href="${haber.link}" target="_blank" class="original-link">Orijinal Habere Git <i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                    </div>
                `;
                loadGiscus();
            } catch (error) {
                console.error("Hata:", error);
                document.getElementById('news-content').innerHTML = '<div style="padding: 2rem; text-align: center;">Haber metni yüklenemedi veya silinmiş olabilir.</div>';
            }
        }

        window.onload = haberiGetir;
    </script>
</body>
</html>
